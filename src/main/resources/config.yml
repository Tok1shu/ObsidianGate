# ⚠️ IMPORTANT: This plugin only works on licensed servers!
# It requires 'online-mode' to be enabled, as it relies on UUID tracking.
# If 'online-mode' is disabled, the plugin will NOT function.

# -------------------------------------------------------
#          Welcome to the ObsidianGate Config!
# -------------------------------------------------------
# This configuration file allows you to customize the
# behavior and settings of the ObsidianGate plugin.
# ObsidianGate synchronizes Minecraft and Discord accounts,
# offers automated nickname updates, two-factor authentication, and more.
# 
# Need help? Visit our documentation or support page:
# https://obsidian.plushy.network/
# 
# Happy customizing!
# -------------------------------------------------------

# -------------------[Plugin Build Version]-------------------
# DO NOT CHANGE THIS LINE!
# Format:
# [TYPE]-[YYMMDD]-[HHMM]-[Pxx]-[Vzzz]-[xxx]
#
# TYPE   : Build type/stage (CO = Crying Obsidian — development build)
# YYMMDD : Build date (25 = year 2025, 04 = April, 13 = day)
# HHMM   : Build time in 24-hour format (03:50 AM) (Prague time)
# Pxx    : Number of parameters included in this build (P22 = 22 parameters)
# Vzzz   : Target version the plugin is built for (V215 = version 1.21.5)
#
# Example:
# CO-250413-0350-P22-V215
# → Dev build made on April 13, 2025 at 03:50 AM
# → Contains 22 parameters, built for version 1.21.5
build: CO-250413-0350-P22-V215


# -------------------[Language Settings]-------------------
# The language used by the plugin.
# Available options:
#   - english
#   - russian
# If an invalid or unsupported language is specified,
# the plugin will default to 'english'.
language: "english"


# -------------------[Discord Settings]-------------------
# Configure the Discord bot settings to link your server
# with your Discord community for account synchronization.

# Discord Token
# The token required for bot authorization. The plugin will
# not function until the bot is authorized.
# Default: "PASTE TOKEN HERE"
discord-token: "PASTE TOKEN HERE"

# Main Guild ID
# The ID of your main Discord server (the primary guild).
# This is required for syncing roles and sending notifications.
main-guild-id: "PASTE MAIN GUILD ID HERE"

# Allow Bot on Other Servers
# Enable the bot to be added to other Discord servers.
# It will automatically sync nicknames of linked players.
# Useful if players create community servers.
# Default: false
allow-bot-on-other-servers: false

# Verify Role Assignment
# Should the bot automatically assign a "verified" role to linked users?
# Default: false
assign-verified-role: false

# Verified Role ID
# The Discord role ID to assign when a player links their account.
verified-role-id: "PASTE VERIFIED ROLE ID HERE"


# -------------------[Account Synchronization]-------------------
# Manage account linking, automatic relinking, and nickname updates.

# Enable or disable automatic relinking when a player changes their nickname.
# This will ONLY work if 'online-mode' is enabled, as it relies on UUID tracking.
# When a player's UUID remains the same but their username changes,
# the plugin will detect the new name and update it in Discord.
# Default: true
auto-relink-on-nickname-change: true


# Whitelist Settings
# Configure how the plugin interacts with your whitelist.
# It will automatically be set to false if the server whitelist is enabled (The vanilla whitelist is already automated and does not require additional automation).
whitelist:
    enabled: false # Does the plugin manage the whitelist?
    type: custom # Options: custom
    add-command: "whitelist add {username}" # Command to add a player (no /)
    remove-command: "whitelist remove {username}" # Command to remove a player (no /)

# Discord Link Requirement
# Should players be required to link their Discord account?
# Default: false
require-discord-link: false

# Discord Presence Requirement
# Should players be required to be in the Discord main guild?
# Default: true
require-discord-presence: true

# Ban Synchronization
# Synchronize player bans in the main guild
# ⚠ The ban does not apply to member servers unless configured by an external guild administrator.
# The parameter does not interact in any way with already banned players!
# Options:
#  false - disable synchronization
#  two-way - two-way synchronization (Discord ban = Minecraft ban and vice versa)
#  discord-to-mc - only from Discord to Minecraft
#  mc-to-discord - only from Minecraft to Discord
# Default: false
ban-synchronization: false

# -------------------[Security & 2FA]-------------------
# Secure logins with two-factor authentication.

# Enable Two-Factor Authentication (2FA) for all players.
# Default: false
enable-2fa: false

# 2FA Mode
# Configure when 2FA is triggered.
# Options: always, location-change, ip-change
# Default: location-change
2fa-mode: "location-change"

# Require 2FA to Play
# Should players be forced to set up 2FA before they can play?
# Default: false
require-2fa: false

# 2FA Expiry Time (in seconds)
# How long the 2FA code remains valid.
# Default: 300 (5 minutes)
2fa-expiry-time: 300

# How 2FA Works:
# When a player logs in, they will receive a message asking
# them to confirm their login through a button in Discord.
# Until confirmation, they won’t be able to move or interact.


# -------------------[Database Settings]-------------------
# Configure SQL connection settings for storing linked accounts.
# This section supports MySQL, PostgreSQL, and SQLite.

database:
    # Type of the database. Options: mysql, postgres, sqlite
    # Default: mysql
    type: "mysql"

    # Hostname of the database server.
    # Default: localhost
    host: "localhost"

    # Port number for the database connection.
    # MySQL default: 3306
    # PostgreSQL default: 5432
    # SQLite does not require a port.
    port: 3306

    # Name of the database to connect to.
    # Default: obsidiangate
    name: "obsidiangate"

    # Username to connect to the database.
    # Default: root
    user: "root"

    # Password for the database user.
    # Default: password
    password: "password"

    # Prefix for the tables. Useful for multi-server setups or database segmentation.
    # Default: OG_
    prefix: "OG_"

    # SQLite-specific configuration:
    # SQLite file path (only needed if the database type is set to sqlite).
    # Default: "obsidiangate.db"
    sqlite-path: "obsidiangate.db"

# -------------------[API & Developer Options]-------------------
# Configure how the plugin interacts with external services or other plugins.
# Need help with api? Visit our documentation or support page:
# https://obsidian.plushy.network/api/
#

# Enable external API access for custom bots or web panels.
# Default: false
enable-api: false

# Server IP & Port
# Specify the server IP and port for API requests.
server-ip: "0.0.0.0"
api-port: 8080

# API Key
# The key required for accessing the API.
api-key: "GENERATE_KEY_HERE" # API key was generated by plugin


# -------------------[Role Automation]-------------------
# Automate role management with LuckPerms.

# Enable Role Sync
# Sync Minecraft ranks with Discord roles based on player groups.
# Requires LuckPerms for Minecraft permissions.
# Default: true
role-sync:
    enable: false
    roles:
        admin: "Admin Role ID"
        moderator: "Moderator Role ID"
        vip: "VIP Role ID"


# -------------------[Notifications & Logging]-------------------
# Configure notifications for account events and server activity.

# Notify Discord about failed 2FA authentication attempts.
# A failed attempt occurs if the user does not confirm within the allocated time
# or if they disconnect from the server before completing the verification.
# Default: true
failed-2fa-notifications: true


# Log nickname changes to Discord.
# Default: true
log-nickname-changes: true


# -------------------------------------------------------
#                    End of Configuration
# -------------------------------------------------------
# Save and reload the server for changes to take effect.
# Enjoy using ObsidianGate! 🚀
# -------------------------------------------------------